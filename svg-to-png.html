<!DOCTYPE html>
<html>
<head>
    <title>SVG to PNG Converter</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; text-align: center; }
        canvas { border: 2px solid #ddd; margin: 10px; display: block; }
        button { padding: 10px 20px; font-size: 16px; margin: 10px; }
        .download-link { display: inline-block; margin: 5px; padding: 5px 10px; background: #007acc; color: white; text-decoration: none; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>Convert SVG to PNG Icons</h1>
    <p>Click the button below to generate PNG icons from SVG:</p>
    <button onclick="convertSVGtoPNG()">Convert & Download PNGs</button>
    <div id="canvases"></div>
    <div id="downloads"></div>

    <script>
        const svgContent = `<svg xmlns="http://www.w3.org/2000/svg" width="SIZE" height="SIZE" viewBox="0 0 100 100">
    <defs>
        <radialGradient id="grad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" style="stop-color:#ff6666;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ff4444;stop-opacity:1" />
        </radialGradient>
    </defs>
    <circle cx="50" cy="50" r="45" fill="url(#grad)" stroke="#cc3333" stroke-width="2"/>
    <circle cx="50" cy="50" r="35" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
    <line x1="50" y1="50" x2="50" y2="25" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="50" y1="50" x2="65" y2="50" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <circle cx="50" cy="50" r="3" fill="#ffffff"/>
</svg>`;

        function convertSVGtoPNG() {
            const sizes = [192, 512];
            const canvasesDiv = document.getElementById('canvases');
            const downloadsDiv = document.getElementById('downloads');
            
            canvasesDiv.innerHTML = '';
            downloadsDiv.innerHTML = '';

            sizes.forEach(size => {
                // Create canvas
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                canvas.style.maxWidth = '200px';
                canvas.style.maxHeight = '200px';
                canvasesDiv.appendChild(canvas);

                const ctx = canvas.getContext('2d');
                
                // Create image from SVG
                const img = new Image();
                const svgBlob = new Blob([svgContent.replace(/SIZE/g, size)], {type: 'image/svg+xml'});
                const url = URL.createObjectURL(svgBlob);
                
                img.onload = function() {
                    // Draw image to canvas
                    ctx.drawImage(img, 0, 0, size, size);
                    
                    // Convert to PNG and create download link
                    canvas.toBlob(function(blob) {
                        const link = document.createElement('a');
                        link.href = URL.createObjectURL(blob);
                        link.download = `icon-${size}x${size}.png`;
                        link.textContent = `Download ${size}x${size} PNG`;
                        link.className = 'download-link';
                        downloadsDiv.appendChild(link);
                    }, 'image/png');
                    
                    URL.revokeObjectURL(url);
                };
                
                img.src = url;
            });
        }
    </script>
</body>
</html>
